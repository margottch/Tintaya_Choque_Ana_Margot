<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Administrativo - Ejercicio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <aside class="col-12 col-md-3 bg-dark text-white min-vh-100">
        <div class="p-3">
          <h4>Dashboard</h4>
          <nav class="nav flex-column">
            <!-- Modificar los enlaces del menú cambiando el atributo href -->
            <a class="nav-link text-white" href="#inicio">Inicio</a>
            <a class="nav-link text-white" href="#usuarios">Usuarios</a>
            <a class="nav-link text-white" href="#productos">Productos</a>
            <a class="nav-link text-white" href="#reportes">Reportes</a>
            <a class="nav-link text-white" href="#configuracion">Configuración</a>
          </nav>
        </div>
      </aside>

      <!-- Área de contenido principal -->
      <main class="col-12 col-md-9 p-4">
        <h1>Dashboard Administrativo</h1>
        <p>Este primer código crea el layout: sidebar (3 columnas) y área de contenido (9 columnas).</p>

        <div class="row mt-4">
          <div class="col-sm-6 col-lg-4 mb-4">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">Panel 1</h5>
                <p class="card-text">Contenido del panel 1.</p>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-lg-4 mb-4">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">Panel 2</h5>
                <p class="card-text">Contenido del panel 2.</p>
              </div>
            </div>
          </div>
          <div class="col-sm-12 col-lg-4 mb-4">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">Panel 3</h5>
                <p class="card-text">Contenido del panel 3.</p>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
